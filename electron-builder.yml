appId: com.lphie.bz.dashboard
productName: LPhiE BZ Dashboard
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
